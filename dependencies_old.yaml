# This file defines all external dependencies for the ComfyUI project.
# The `manage_dependencies.py` script will parse this file to download
# all the necessary models, custom nodes, and other assets.

# The structure is a list of items, where each item has a `type`
# (git or file), a `destination` path, and a `url`.

